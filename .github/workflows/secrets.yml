name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # History is clean today. This catches the commit that changes that.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Scan history, not just the tip: a secret committed and then deleted
          # is still a secret.
          fetch-depth: 0

      # The gitleaks *tool* is MIT and free. `gitleaks/gitleaks-action` is not —
      # it demands a paid licence for organisation-owned repos and refuses to
      # scan without one. Run the binary directly.
      - name: gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --config=/repo/.gitleaks.toml \
                   --redact --no-banner --verbose
